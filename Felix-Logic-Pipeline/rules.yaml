# =================================================================
# METADATA & FEATURE EXTRACTION ENGINE
# This defines the data types and how to compute features from the CSV.
# Available in environment: row (the current pandas row), pd, len, any, str
# =================================================================

# this is kind of a template document for what the rules should look like
features:
  - name: "construct_id"
    type: "string"
    source: "str(row['construct_id'])"

  - name: "promoter_len"
    type: "int"
    source: "int(row['promoter_len']) if pd.notna(row['promoter_len']) else 0"

  - name: "utr5_len"
    type: "int"
    source: "int(row['utr5_len']) if pd.notna(row['utr5_len']) else 0"

  - name: "cds_len"
    type: "int"
    source: "int(row['cds_len']) if pd.notna(row['cds_len']) else 0"

  - name: "term_len"
    type: "int"
    source: "int(row['term_len']) if pd.notna(row['term_len']) else 0"

  - name: "expr_mean"
    type: "real"
    source: "float(row['expr_mean']) if pd.notna(row['expr_mean']) else 0.0"

  # Custom Bio-Feature Computations written as inline Python snippets:
  - name: "gc_content"
    type: "real"
    source: "(str(row['full_tu']).upper().count('G') + str(row['full_tu']).upper().count('C')) / len(str(row['full_tu'])) if pd.notna(row['full_tu']) else 0.0"

  - name: "cds_starts_codon"
    type: "bool"
    source: "str(row['cds']).upper().startswith(('ATG', 'GTG', 'TTG')) if pd.notna(row['cds']) else False"

  - name: "cds_ends_stop"
    type: "bool"
    source: "str(row['cds']).upper().endswith(('TAA', 'TAG', 'TGA')) if pd.notna(row['cds']) else False"

  - name: "has_rbs_motif"
    type: "bool"
    source: "any(motif in str(row['utr5']).upper() for motif in ['AGGAGG', 'GGAGG', 'GAGG', 'AAGG']) if pd.notna(row['utr5']) else False"

# =================================================================
# LOGICAL SMT RULES
# =================================================================
rules:
  - name: "Structural Integrity Checklist"
    type: "simple"
    expr: "And(promoter_len > 0, utr5_len > 0, cds_len > 0, term_len > 0)"

  - name: "Valid Start Codon Check"
    type: "simple"
    expr: "cds_starts_codon == True"

  - name: "Valid Stop Codon Check"
    type: "simple"
    expr: "cds_ends_stop == True"

  - name: "Codon Triplet Divisibility"
    type: "simple"
    expr: "cds_len % 3 == 0"

  - name: "GC Content Limit for High Expressors"
    type: "conditional"
    if: "expr_mean > 0.5"
    then: "gc_content <= 0.60"

  - name: "RBS Motif Requirement for High Expressors"
    type: "conditional"
    if: "expr_mean > 0.5"
    then: "has_rbs_motif == True"